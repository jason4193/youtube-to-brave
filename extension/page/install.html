      <button class="settings-item" id="btnOpenInstallGuide">
        Open mac install guide
      </button>
      <button class="settings-item" id="btnOpenUninstallGuide">
        Open mac uninstall guide
      </button>
    </div>

    <!-- ── Hero ────────────────────────────────────────────── -->
    <div class="hero">
      <div class="browser-frame" aria-label="Chrome">
        <img
          src="../assets/chrome-light.svg"
          alt="Chrome"
          class="browser-icon light-mode"
        />
        <img
          src="../assets/chrome-dark.svg"
          alt="Chrome"
          class="browser-icon dark-mode"
        />
      </div>

      <div class="hero-arrow">
        <!-- Arrow -->
        <svg
          width="36"
          height="20"
          viewBox="0 0 36 20"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M1 10H30M30 10L22 3M30 10L22 17"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span class="hero-status-label" id="heroLabel">Checking</span>
      </div>

      <div class="browser-frame" aria-label="Brave">
        <img
          src="../assets/brave-light.svg"
          alt="Brave"
          class="browser-icon light-mode"
        />
        <img
          src="../assets/brave-dark.svg"
          alt="Brave"
          class="browser-icon dark-mode"
        />
      </div>
    </div>

    <!-- ── Status Track ───────────────────────────────────── -->
    <div class="status-track" role="status" aria-label="Connection status">

      <div class="status-line" data-line="1"></div>
      <div class="status-node" data-step="2">
        <div class="status-dot"></div>
        <span class="status-label">Checking</span>
      </div>
      <div class="status-line" data-line="2"></div>
      <div class="status-node" data-step="3">
        <div class="status-dot"></div>
        <span class="status-label">Active</span>
      </div>
    </div>
